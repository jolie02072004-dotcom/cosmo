    <style>
        :root {
            --cosmo-blue: #69C9FF;
            --cosmo-mint: #8EF0D2;
            --cosmo-purple: #A7B8FF;
            --cosmo-bg: #E6F7FF;
        }
        body {
            font-family: 'Outfit', 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 50%, #eef2ff 100%);
            min-height: 100vh;
            color: #334155;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            box-shadow: 0 10px 30px -5px rgba(105, 201, 255, 0.15);
        }
        .perspective { perspective: 1000px; }
        
        .flip-card-inner {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flipped { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            backface-visibility: hidden;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
        .flip-card-back { transform: rotateY(180deg); }
        
        .cosmo-gradient-text {
            background: linear-gradient(135deg, #3b82f6, #06b6d4, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .cosmo-btn-gradient {
            background: linear-gradient(135deg, #69C9FF, #8EF0D2);
            color: white;
            box-shadow: 0 4px 15px rgba(105, 201, 255, 0.35);
        }
        .cosmo-btn-gradient:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }
        
        .mosco-float {
            animation: float 3.5s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(1.5deg); }
        }

        /* NotebookLM Smooth Slide Transitions */
        .card-container-wrapper {
            position: relative;
            overflow: hidden;
        }
        .slide-next-enter {
            animation: slideNextEnter 0.35s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        .slide-prev-enter {
            animation: slidePrevEnter 0.35s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes slideNextEnter {
            from {
                opacity: 0.3;
                transform: translateX(40px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        @keyframes slidePrevEnter {
            from {
                opacity: 0.3;
                transform: translateX(-40px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }
    </style>

                                clearInterval(interval);
                                setTimeout(() => setShowSplash(false), 300);
                                return 100;
                            }
                            return prev + 5;
                        });
                    }, 35);
                    return () => clearInterval(interval);
                }
            }, [showSplash]);

            // Filter vocab by Review section
            const currentVocabList = useMemo(() => {
                if (selectedSection === 'review1') return VOCAB_DATA.filter(v => v.unit >= 1 && v.unit <= 3);
                if (selectedSection === 'review2') return VOCAB_DATA.filter(v => v.unit >= 4 && v.unit <= 6);
                if (selectedSection === 'review3') return VOCAB_DATA.filter(v => v.unit >= 7 && v.unit <= 9);
                if (selectedSection === 'review4') return VOCAB_DATA.filter(v => v.unit >= 10 && v.unit <= 12);
                return VOCAB_DATA;
            }, [selectedSection]);

            const handleSectionChange = (section) => {
                setSelectedSection(section);
                setMode('flashcard');
                setCurrentIndex(0);
                setIsFlipped(false);
                setSlideKey(prev => prev + 1);
            };

            const speakWord = (text, e) => {
                if (e) e.stopPropagation();
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const cleanText = text.replace(/\(The\)/gi, '').replace(/\(r\)/gi, '');
                    const utterance = new SpeechSynthesisUtterance(cleanText);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    window.speechSynthesis.speak(utterance);
                }
            };

            const nextCard = () => {
                setIsFlipped(false);
                setSlideDirection('next');
                setSlideKey(prev => prev + 1);

                if (currentIndex < currentVocabList.length - 1) {
                    setCurrentIndex(prev => prev + 1);
                } else {
                    startQuiz();
                }
            };

            const prevCard = () => {
                if (currentIndex > 0) {
                    setIsFlipped(false);
                    setSlideDirection('prev');
                    setSlideKey(prev => prev + 1);
                    setCurrentIndex(prev => prev - 1);
                }
            };

            // Keyboard shortcuts navigation
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (mode !== 'flashcard' || showSplash) return;

                    if (e.code === 'ArrowUp') {
                        e.preventDefault();
                        speakWord(currentVocabList[currentIndex].word);
                    } else if (e.code === 'ArrowDown' || e.code === 'Space') {
                        e.preventDefault();
                        setIsFlipped(prev => !prev);
                    } else if (e.code === 'ArrowRight') {
                        e.preventDefault();
                        nextCard();
                    } else if (e.code === 'ArrowLeft') {
                        e.preventDefault();
                        prevCard();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isFlipped, currentIndex, mode, currentVocabList, showSplash]);

            const startQuiz = () => {
                const shuffled = shuffle(currentVocabList);
                const isFinal = selectedSection === 'final';
                
                const mcqCount = isFinal ? Math.min(30, shuffled.length) : Math.min(15, shuffled.length);
                const mcq = shuffled.slice(0, mcqCount).map(item => {
                    const options = shuffle([
                        item.mean,
                        ...shuffle(VOCAB_DATA.filter(v => v.word !== item.word)).slice(0, 3).map(v => v.mean)
                    ]);
                    return { ...item, options };
                });
                setMcqQuestions(mcq);
                
                const writtenCount = isFinal ? Math.min(15, shuffled.length) : Math.min(8, shuffled.length);
                const written = shuffle(currentVocabList).slice(0, writtenCount);
                setWrittenQuestions(written);
                
                setMode('quiz-mcq');
                setCurrentIndex(0);
                setMcqAnswers({});
                setWrittenUserAnswers({});
                setWrittenValue("");
                setMcqScore(0);
                setWrittenScore(0);
            };

            const handleMCQSelect = (answer) => {
                setMcqAnswers(prev => ({ ...prev, [currentIndex]: answer }));
                if (currentIndex < mcqQuestions.length - 1) {
                    setTimeout(() => {
                        setSlideDirection('next');
                        setSlideKey(prev => prev + 1);
                        setCurrentIndex(prev => prev + 1);
                    }, 180);
                }
            };

            const submitMCQ = () => {
                let correct = 0;
                mcqQuestions.forEach((q, idx) => {
                    if (mcqAnswers[idx] === q.mean) correct++;
                });
                setMcqScore(correct);
                setCurrentIndex(0);
                setWrittenValue("");
                setMode('quiz-written');
            };

            const handleWrittenSubmit = (e) => {
                if (e.key === 'Enter') {
                    if (!writtenValue.trim()) return;
                    
                    const currentWord = writtenQuestions[currentIndex];
                    const val = writtenValue.trim();
                    
                    setWrittenUserAnswers(prev => ({ ...prev, [currentIndex]: val }));
                    
                    const normalizedInput = val.toLowerCase().replace(/^(the\s+)/i, '');
                    const normalizedTarget = currentWord.word.toLowerCase().replace(/^\(the\)\s+/i, '').replace(/^(the\s+)/i, '');
                    
                    if (normalizedInput === normalizedTarget) {
                        setWrittenScore(prev => prev + 1);
                    }
                    
                    if (currentIndex < writtenQuestions.length - 1) {
                        setSlideDirection('next');
                        setSlideKey(prev => prev + 1);
                        setCurrentIndex(prev => prev + 1);
                        setWrittenValue("");
                    } else {
                        setMode('result');
                    }
                }
            };

            // Calculate wrong answers
            const wrongMcqList = useMemo(() => {
                return mcqQuestions.filter((q, idx) => mcqAnswers[idx] !== q.mean).map((q) => ({
                    word: q.word,
                    ipa: q.ipa,
                    userAns: mcqAnswers[mcqQuestions.indexOf(q)] || "Chưa chọn",
                    correctAns: q.mean
                }));
            }, [mcqQuestions, mcqAnswers]);

            const wrongWrittenList = useMemo(() => {
                return writtenQuestions.filter((q, idx) => {
                    const userAns = (writtenUserAnswers[idx] || "").trim().toLowerCase().replace(/^(the\s+)/i, '');
                    const target = q.word.toLowerCase().replace(/^\(the\)\s+/i, '').replace(/^(the\s+)/i, '');
                    return userAns !== target;
                }).map((q) => {
                    const qIndex = writtenQuestions.indexOf(q);
                    return {
                        mean: q.mean,
                        userAns: writtenUserAnswers[qIndex] || "(Bỏ trống)",
                        correctAns: q.word
                    };
                });
            }, [writtenQuestions, writtenUserAnswers]);

            // SPLASH SCREEN
            if (showSplash) {
                return (
                    <div className="fixed inset-0 bg-[#E6F7FF] flex flex-col items-center justify-between p-8 z-50">
                        <div></div>
                        <div className="flex flex-col items-center text-center max-w-sm w-full">
                            <MoscoAvatar mood="wink" size="lg" />
                            <h1 className="text-5xl font-black cosmo-gradient-text tracking-wider mt-2">COSMO</h1>
                            
                            {/* Author Credit on Splash Screen */}
                            <p className="text-slate-400 font-semibold text-xs tracking-widest mt-1 mb-5">by dan.trn</p>
                            
                            {/* Motivational quote */}
                            <div className="flex items-center justify-center gap-2 mb-8 text-sky-700 font-bold text-xs bg-white/80 px-6 py-2.5 rounded-full border border-sky-100 shadow-sm text-center">
                                ✨ Every star has a story. Shine your way!
                            </div>

                            {/* Loading Bar */}
                            <div className="w-full h-3 bg-white/80 rounded-full p-0.5 border border-sky-100 shadow-inner overflow-hidden">
                                <div 
                                    className="h-full rounded-full cosmo-btn-gradient transition-all duration-200"
                                    style={{ width: `${splashProgress}%` }}
                                ></div>
                            </div>
                        </div>

                        <button 
                            onClick={() => setShowSplash(false)}
                            className="text-slate-400 text-xs font-semibold hover:text-sky-500 transition-colors"
                        >
                            Chạm để vào ngay ✨
                        </button>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col items-center p-4 md:p-6 max-w-5xl mx-auto">
                    {/* Header Nav */}
                    <header className="w-full flex flex-col md:flex-row justify-between items-center py-3 px-6 glass-panel mb-6 gap-4">
                        <div className="flex items-center gap-3">
                            <MoscoAvatar mood="happy" size="sm" />
                            <h1 className="text-3xl font-black cosmo-gradient-text tracking-tight">COSMO</h1>
                        </div>

                        {/* Review Sections */}
                        <div className="flex flex-wrap gap-1.5 justify-center">
                            {[
                                { id: 'review1', label: 'Review 1 (U1-3)' },
                                { id: 'review2', label: 'Review 2 (U4-6)' },
                                { id: 'review3', label: 'Review 3 (U7-9)' },
                                { id: 'review4', label: 'Review 4 (U10-12)' },
                                { id: 'final', label: 'Final Review' }
                            ].map(sec => (
                                <button
                                    key={sec.id}
                                    onClick={() => handleSectionChange(sec.id)}
                                    className={`px-3 py-1.5 rounded-2xl font-bold text-xs transition-all ${
                                        selectedSection === sec.id
                                        ? 'cosmo-btn-gradient text-white shadow-sm'
                                        : 'bg-white/60 text-slate-600 hover:bg-white border border-slate-100'
                                    }`}
                                >
                                    {sec.label}
                                </button>
                            ))}
                        </div>
                    </header>

                    {/* Mode Bar */}
                    <div className="w-full flex justify-between items-center mb-3 px-2">
                        <div className="flex gap-2">
                            <button 
                                onClick={() => { setMode('flashcard'); setCurrentIndex(0); setIsFlipped(false); }}
                                className={`px-4 py-2 rounded-2xl text-xs font-bold transition-all ${mode === 'flashcard' ? 'bg-sky-500 text-white shadow-md' : 'glass-panel text-slate-600'}`}
                            >
                                Học Flashcards ({currentVocabList.length})
                            </button>
                            <button 
                                onClick={startQuiz}
                                className={`px-4 py-2 rounded-2xl text-xs font-bold transition-all ${mode.startsWith('quiz') ? 'bg-indigo-500 text-white shadow-md' : 'glass-panel text-slate-600'}`}
                            >
                                Bài Kiểm Tra
                            </button>
                        </div>
                        <div className="px-4 py-2 glass-panel text-xs font-bold text-sky-600">
                            {mode === 'flashcard' && `${currentIndex + 1} / ${currentVocabList.length}`}
                            {mode === 'quiz-mcq' && `Trắc nghiệm: ${currentIndex + 1} / ${mcqQuestions.length}`}
                            {mode === 'quiz-written' && `Tự luận: ${currentIndex + 1} / ${writtenQuestions.length}`}
                            {mode === 'result' && "Báo cáo điểm"}
                        </div>
                    </div>

                    {/* Progress Bar */}
                    <div className="w-full h-2 bg-white/60 rounded-full mb-6 overflow-hidden p-0.5 border border-sky-100">
                        <div 
                            className="h-full cosmo-btn-gradient rounded-full transition-all duration-300" 
                            style={{ 
                                width: `${
                                    mode === 'flashcard' ? ((currentIndex + 1) / currentVocabList.length) * 100 :
                                    mode === 'quiz-mcq' ? ((currentIndex + 1) / mcqQuestions.length) * 100 :
                                    mode === 'quiz-written' ? ((currentIndex + 1) / writtenQuestions.length) * 100 : 100
                                }%` 
                            }}
                        ></div>
                    </div>

                    {/* Main Content Area */}
                    <main className="w-full flex-1 flex flex-col items-center justify-center">
                        {/* 1. FLASHCARD MODE (NotebookLM Transition Style) */}
                        {mode === 'flashcard' && (
                            <div className="w-full max-w-md flex flex-col items-center">
                                <div className="w-full card-container-wrapper">
                                    <div 
                                        key={slideKey}
                                        className={`relative h-96 w-full perspective cursor-pointer ${
                                            slideDirection === 'next' ? 'slide-next-enter' : 'slide-prev-enter'
                                        }`}
                                        onClick={() => setIsFlipped(!isFlipped)}
                                    >
                                        <div className={`flip-card-inner w-full h-full relative ${isFlipped ? 'flipped' : ''}`}>
                                            {/* Front Side */}
                                            <div className="flip-card-front glass-panel p-8 flex flex-col justify-between items-center text-center border-2 border-white">
                                                <div className="w-full flex justify-between items-center">
                                                    <span className="text-xs font-bold text-sky-500 bg-sky-50 px-3 py-1 rounded-full border border-sky-100">
                                                        Unit {currentVocabList[currentIndex].unit}
                                                    </span>
                                                    <span className="text-xs font-bold text-slate-400">({currentVocabList[currentIndex].type})</span>
                                                </div>

                                                <div className="flex flex-col items-center my-auto">
                                                    <h2 className="text-3xl font-black text-slate-800 mb-2">{currentVocabList[currentIndex].word}</h2>
                                                    <p className="text-slate-400 italic text-base font-medium mb-6">{currentVocabList[currentIndex].ipa}</p>

                                                    <button 
                                                        onClick={(e) => speakWord(currentVocabList[currentIndex].word, e)}
                                                        className="flex items-center gap-2 px-5 py-2.5 bg-sky-50 text-sky-600 rounded-full hover:bg-sky-100 transition-all font-bold text-xs shadow-sm border border-sky-100"
                                                    >
                                                        🔊 Nghe phát âm
                                                    </button>
                                                </div>

                                                <div className="text-slate-400 text-xs font-medium">
                                                    ✨ Nhấp mặt thẻ để lật xem nghĩa
                                                </div>
                                            </div>

                                            {/* Back Side */}
                                            <div className="flip-card-back glass-panel p-8 flex flex-col justify-between items-center text-center bg-emerald-50/90 border-2 border-emerald-100">
                                                <div className="w-full text-right">
                                                    <span className="text-xs font-bold text-emerald-600 bg-white/80 px-3 py-1 rounded-full">Tiếng Việt</span>
                                                </div>
                                                <div className="my-auto">
                                                    <h2 className="text-2xl font-bold text-slate-800 leading-relaxed">{currentVocabList[currentIndex].mean}</h2>
                                                </div>
                                                <div className="text-emerald-500 text-xs font-medium">
                                                    Mosco: "Nhớ ghi nhớ nghĩa này nhé!" ✨
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Controls Navigation Buttons */}
                                <div className="flex justify-between items-center mt-6 w-full gap-4">
                                    <button 
                                        onClick={prevCard} 
                                        disabled={currentIndex === 0}
                                        className="flex-1 py-3.5 glass-panel text-slate-700 font-bold transition-all hover:bg-white active:scale-95 text-sm flex items-center justify-center gap-2 disabled:opacity-40"
                                    >
                                        <span>←</span> Câu trước
                                    </button>
                                    <button 
                                        onClick={nextCard} 
                                        className="flex-1 py-3.5 cosmo-btn-gradient text-white rounded-2xl font-bold transition-all active:scale-95 text-sm flex items-center justify-center gap-2"
                                    >
                                        Chuyển từ tiếp <span>→</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 2. MCQ QUIZ MODE */}
                        {mode === 'quiz-mcq' && (
                            <div className="w-full max-w-xl glass-panel p-8 border-2 border-white">
                                <div className="mb-6">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-xs font-bold text-sky-500 uppercase tracking-wider">Câu {currentIndex + 1} / {mcqQuestions.length}</span>
                                        <span className="text-xs font-bold text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full">Trắc nghiệm</span>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <h3 className="text-3xl font-black text-slate-800">{mcqQuestions[currentIndex].word}</h3>
                                        <button onClick={(e) => speakWord(mcqQuestions[currentIndex].word, e)} className="p-2 text-sky-500 bg-sky-50 rounded-full hover:bg-sky-100">
                                            🔊
                                        </button>
                                    </div>
                                    <p className="text-slate-400 italic text-sm mt-1">{mcqQuestions[currentIndex].ipa} ({mcqQuestions[currentIndex].type})</p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3.5">
                                    {mcqQuestions[currentIndex].options.map((opt, i) => (
                                        <button 
                                            key={i}
                                            onClick={() => handleMCQSelect(opt)}
                                            className={`p-4 text-left rounded-2xl border transition-all font-semibold text-sm flex items-center ${
                                                mcqAnswers[currentIndex] === opt 
                                                ? 'border-sky-400 bg-sky-50 text-sky-700 shadow-sm' 
                                                : 'border-slate-100 bg-white/70 hover:bg-white hover:border-sky-200 text-slate-600'
                                            }`}
                                        >
                                            <span className="inline-block w-7 h-7 rounded-xl bg-slate-100 text-center leading-7 mr-3 text-xs font-bold text-slate-500">{String.fromCharCode(65 + i)}</span>
                                            <span className="flex-1">{opt}</span>
                                        </button>
                                    ))}
                                </div>

                                <div className="mt-8 flex justify-between items-center">
                                    <button 
                                        onClick={() => setCurrentIndex(prev => Math.max(0, prev - 1))}
                                        disabled={currentIndex === 0}
                                        className="px-4 py-2 text-slate-400 font-bold text-xs disabled:opacity-30"
                                    >
                                        Câu trước
                                    </button>
                                    {currentIndex === mcqQuestions.length - 1 ? (
                                        <button onClick={submitMCQ} className="px-6 py-3 cosmo-btn-gradient text-white rounded-2xl font-bold shadow-md text-xs">
                                            Chuyển sang Tự luận →
                                        </button>
                                    ) : (
                                        <button onClick={() => setCurrentIndex(prev => Math.min(mcqQuestions.length - 1, prev + 1))} className="px-4 py-2 text-sky-500 font-bold text-xs">
                                            Bỏ qua →
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* 3. WRITTEN QUIZ MODE */}
                        {mode === 'quiz-written' && (
                            <div className="w-full max-w-lg glass-panel p-8 text-center border-2 border-white">
                                <span className="text-xs font-bold text-emerald-500 uppercase tracking-wider bg-emerald-50 px-3 py-1 rounded-full">Tự luận {currentIndex + 1} / {writtenQuestions.length}</span>
                                
                                <h3 className="text-sm font-bold text-slate-500 mt-6 mb-2">Nhập từ Tiếng Anh tương ứng với nghĩa:</h3>
                                
                                <div className="text-2xl font-black text-slate-800 mb-6 bg-white/80 p-4 rounded-2xl border border-sky-100 shadow-sm">
                                    "{writtenQuestions[currentIndex].mean}"
                                </div>

                                <p className="text-slate-400 text-xs italic mb-6">{writtenQuestions[currentIndex].ipa} ({writtenQuestions[currentIndex].type})</p>

                                <input 
                                    autoFocus
                                    type="text" 
                                    value={writtenValue}
                                    onChange={(e) => setWrittenValue(e.target.value)}
                                    onKeyDown={handleWrittenSubmit}
                                    placeholder="Gõ từ tiếng Anh rồi ấn Enter..."
                                    className="w-full p-4 text-center text-xl font-bold border-b-2 border-sky-300 focus:border-sky-500 outline-none transition-all text-slate-700 bg-transparent placeholder:font-normal placeholder:text-sm mb-4"
                                />

                                <div className="text-slate-400 text-xs">Ấn <span className="font-bold text-sky-500">Enter ↵</span> để nộp câu này</div>
                            </div>
                        )}

                        {/* 4. RESULT MODE */}
                        {mode === 'result' && (
                            <div className="w-full max-w-2xl glass-panel p-8">
                                <div className="text-center mb-8">
                                    <MoscoAvatar mood={wrongMcqList.length + wrongWrittenList.length === 0 ? "happy" : "think"} size="md" />
                                    <h2 className="text-3xl font-black cosmo-gradient-text mt-3">Kết Quả Báo Cáo</h2>
                                    <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">{selectedSection}</p>

                                    <div className="grid grid-cols-2 gap-4 mt-6 max-w-md mx-auto">
                                        <div className="bg-sky-50/80 p-4 rounded-2xl border border-sky-100">
                                            <div className="text-xs font-bold text-sky-500 uppercase mb-1">Trắc nghiệm</div>
                                            <div className="text-2xl font-black text-sky-700">{mcqScore} / {mcqQuestions.length}</div>
                                        </div>
                                        <div className="bg-emerald-50/80 p-4 rounded-2xl border border-emerald-100">
                                            <div className="text-xs font-bold text-emerald-500 uppercase mb-1">Tự luận</div>
                                            <div className="text-2xl font-black text-emerald-700">{writtenScore} / {writtenQuestions.length}</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Review List */}
                                {(wrongMcqList.length > 0 || wrongWrittenList.length > 0) ? (
                                    <div className="space-y-6 border-t border-slate-100 pt-6">
                                        <h3 className="text-base font-extrabold text-slate-700 flex items-center gap-2">
                                            <span>📌</span> Các câu bạn đã làm chưa đúng ({wrongMcqList.length + wrongWrittenList.length}):
                                        </h3>

                                        {wrongMcqList.length > 0 && (
                                            <div className="space-y-3">
                                                <h4 className="text-xs font-bold text-sky-600 uppercase">Phần Trắc Nghiệm</h4>
                                                {wrongMcqList.map((item, idx) => (
                                                    <div key={idx} className="bg-white/80 p-4 rounded-2xl border border-rose-100 flex flex-col gap-1 text-sm">
                                                        <div className="font-bold text-slate-800">{item.word} <span className="text-slate-400 font-normal italic text-xs">{item.ipa}</span></div>
                                                        <div className="flex flex-wrap gap-4 text-xs mt-1">
                                                            <span className="text-rose-500">❌ Bạn chọn: <span className="font-semibold">{item.userAns}</span></span>
                                                            <span className="text-emerald-600">✅ Đáp án đúng: <span className="font-bold">{item.correctAns}</span></span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {wrongWrittenList.length > 0 && (
                                            <div className="space-y-3">
                                                <h4 className="text-xs font-bold text-emerald-600 uppercase">Phần Tự Luận</h4>
                                                {wrongWrittenList.map((item, idx) => (
                                                    <div key={idx} className="bg-white/80 p-4 rounded-2xl border border-rose-100 flex flex-col gap-1 text-sm">
                                                        <div className="font-bold text-slate-800">Nghĩa: "{item.mean}"</div>
                                                        <div className="flex flex-wrap gap-4 text-xs mt-1">
                                                            <span className="text-rose-500">❌ Bạn gõ: <span className="font-semibold">{item.userAns}</span></span>
                                                            <span className="text-emerald-600">✅ Từ chính xác: <span className="font-bold">{item.correctAns}</span></span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="bg-emerald-50 text-emerald-700 p-4 rounded-2xl text-center font-bold text-sm">
                                        🎉 Xuất sắc! Bạn không sai câu nào cả! Mosco rất tự hào về bạn! ✨
                                    </div>
                                )}

                                <button 
                                    onClick={() => {
                                        setMode('flashcard');
                                        setCurrentIndex(0);
                                    }} 
                                    className="w-full mt-8 py-4 cosmo-btn-gradient text-white rounded-2xl font-bold shadow-md text-sm"
                                >
                                    Ôn tập lại ngay
                                </button>
                            </div>
                        )}
                    </main>

                    {/* Mosco Floating Footer Companion */}
                    <footer className="mt-8 flex items-center gap-4 bg-white/80 px-6 py-3 rounded-full border border-white/90 shadow-sm">
                        <MoscoAvatar mood="happy" size="sm" />
                        <span className="text-xs font-semibold text-slate-600">
                            Mosco: <span className="text-sky-600 font-bold">"Pip! Học cùng COSMO thật vui mỗi ngày!" ✨</span>
                        </span>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
